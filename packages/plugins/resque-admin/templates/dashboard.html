<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resque Admin</title>
<style>
  :root {
    --bg: #f8f9fa; --bg2: #ffffff; --fg: #212529; --fg2: #6c757d;
    --border: #dee2e6; --accent: #0d6efd; --accent-hover: #0b5ed7;
    --danger: #dc3545; --success: #198754; --warn: #ffc107;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a2e; --bg2: #16213e; --fg: #e0e0e0; --fg2: #a0a0a0;
      --border: #334155; --accent: #4ea8de; --accent-hover: #3a8cc2;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--fg); line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; }
  h2 { font-size: 1.2rem; margin-bottom: 0.75rem; color: var(--fg); }
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 0.5rem 1rem; cursor: pointer; border: none; background: none; color: var(--fg2);
    font-size: 0.9rem; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .panel { display: none; }
  .panel.active { display: block; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 0.85rem; }
  th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: var(--bg2); font-weight: 600; color: var(--fg2); font-size: 0.8rem; text-transform: uppercase; }
  td { background: var(--bg2); }
  pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem;
    overflow-x: auto; font-family: var(--mono); font-size: 0.8rem; margin-bottom: 0.75rem; white-space: pre-wrap; word-break: break-all; }
  button, .btn { padding: 0.35rem 0.75rem; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg2); color: var(--fg); cursor: pointer; font-size: 0.8rem; min-width: 5rem; }
  button:hover, .btn:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
  .btn-danger:hover { opacity: 0.9; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-success { background: var(--success); color: white; border-color: var(--success); }
  .btn-success:hover { opacity: 0.9; }
  input, select, textarea { padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg2); color: var(--fg); font-family: var(--font); font-size: 0.85rem; }
  textarea { font-family: var(--mono); }
  .login { max-width: 400px; margin: 4rem auto; text-align: center; }
  .login input { width: 100%; margin-bottom: 0.75rem; }
  .login button { width: 100%; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; }
  .stat-card .label { font-size: 0.75rem; color: var(--fg2); text-transform: uppercase; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; }
  .form-row { display: flex; gap: 0.5rem; align-items: end; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
  .form-group label { font-size: 0.75rem; color: var(--fg2); text-transform: uppercase; }
  .msg { padding: 0.5rem 0.75rem; border-radius: 4px; margin-bottom: 0.75rem; font-size: 0.85rem; }
  .msg-success { background: #d1e7dd; color: #0f5132; }
  .msg-error { background: #f8d7da; color: #842029; }
  @media (prefers-color-scheme: dark) {
    .msg-success { background: #0f5132; color: #d1e7dd; }
    .msg-error { background: #842029; color: #f8d7da; }
  }
  .refresh-info { font-size: 0.75rem; color: var(--fg2); margin-bottom: 0.75rem; }
  .queue-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
  #queue-chart { width: 100%; height: 180px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 1rem; display: block; }
  .j-key { color: #d73a49; }
  .j-str { color: #22863a; }
  .j-num { color: #005cc5; }
  .j-bool { color: #6f42c1; }
  .j-null { color: #6a737d; }
  @media (prefers-color-scheme: dark) {
    .j-key { color: #ff7b72; }
    .j-str { color: #a5d6ff; }
    .j-num { color: #79c0ff; }
    .j-bool { color: #d2a8ff; }
    .j-null { color: #8b949e; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Resque Admin</h1>

  <div id="login" class="login">
    <h2>Enter Admin Password</h2>
    <input type="password" id="password" placeholder="Password" autofocus>
    <button class="btn-primary" onclick="doLogin()">Login</button>
    <div id="login-error"></div>
  </div>

  <div id="app" style="display:none">
    <div class="tabs">
      <button class="tab active" data-panel="overview">Overview</button>
      <button class="tab" data-panel="failed">Failed</button>
      <button class="tab" data-panel="queues">Queues</button>
      <button class="tab" data-panel="delayed">Delayed</button>
      <button class="tab" data-panel="locks">Locks</button>
      <button class="tab" data-panel="redis">Redis Info</button>
      <button class="tab" data-panel="enqueue">Enqueue</button>
    </div>

    <div id="overview" class="panel active">
      <div class="refresh-info">Auto-refreshes every 5 seconds</div>
      <div id="overview-stats" class="stat-grid"></div>
      <h2>Queues</h2>
      <table><thead><tr><th>Queue</th><th>Jobs</th><th>Actions</th></tr></thead><tbody id="overview-queues"></tbody></table>
      <canvas id="queue-chart"></canvas>
      <h2>Workers</h2>
      <table><thead><tr><th>Worker</th><th>Status</th></tr></thead><tbody id="overview-workers"></tbody></table>
    </div>

    <div id="failed" class="panel">
      <div id="failed-msg"></div>
      <div id="failed-info"></div>
      <table><thead><tr><th>Time</th><th>Action</th><th>Arguments</th><th>Queue</th><th>Error</th><th>Actions</th></tr></thead><tbody id="failed-jobs"></tbody></table>
    </div>

    <div id="queues" class="panel">
      <div class="form-row">
        <div class="form-group">
          <label>Queue Name</label>
          <select id="queue-name"></select>
        </div>
        <button class="btn-primary" onclick="loadQueue()">Inspect</button>
      </div>
      <div id="queue-info"></div>
      <pre id="queue-jobs"></pre>
    </div>

    <div id="delayed" class="panel">
      <div id="delayed-content"></div>
    </div>

    <div id="locks" class="panel">
      <div id="locks-msg"></div>
      <table><thead><tr><th>Lock</th><th>Value</th><th>Actions</th></tr></thead><tbody id="locks-list"></tbody></table>
    </div>

    <div id="redis" class="panel">
      <div id="redis-content"></div>
    </div>

    <div id="enqueue" class="panel">
      <div id="enqueue-msg"></div>
      <div class="form-row">
        <div class="form-group">
          <label>Action Name</label>
          <input type="text" id="enqueue-action" placeholder="action:name">
        </div>
        <div class="form-group">
          <label>Queue</label>
          <input type="text" id="enqueue-queue" placeholder="default">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0.75rem">
        <label>Inputs (JSON)</label>
        <textarea id="enqueue-inputs" rows="4" style="width:100%">{}</textarea>
      </div>
      <button class="btn-primary" onclick="doEnqueue()">Enqueue</button>
    </div>
  </div>
</div>

<script>
const API = "{{API_ROUTE}}";
let password = sessionStorage.getItem("resque-admin-password") || "";
let refreshTimer = null;

function getUrl(path) {
  return API + path;
}

async function apiFetch(path, opts = {}) {
  const method = opts.method || "GET";
  let url = getUrl(path);
  if (method === "GET") {
    const sep = url.includes("?") ? "&" : "?";
    url += sep + "password=" + encodeURIComponent(password);
    if (opts.params) {
      for (const [k, v] of Object.entries(opts.params)) {
        url += "&" + encodeURIComponent(k) + "=" + encodeURIComponent(v);
      }
    }
  }
  const fetchOpts = { method };
  if (method === "POST") {
    fetchOpts.headers = { "Content-Type": "application/json" };
    fetchOpts.body = JSON.stringify({ password, ...opts.body });
  }
  const res = await fetch(url, fetchOpts);
  const data = await res.json();
  if (data.error) throw new Error(typeof data.error === "object" ? data.error.message : data.error);
  return data;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = String(s ?? "");
  return d.innerHTML;
}

const CHART_WINDOW_MS = 5 * 60 * 1000;
const CHART_PALETTE = ["#0d6efd", "#198754", "#dc3545", "#6f42c1", "#fd7e14", "#20c997", "#d63384", "#ffc107"];
const queueHistory = {};

function sampleQueues(queues) {
  const now = Date.now();
  const names = Object.keys(queues);
  for (const name of names) {
    if (!queueHistory[name]) queueHistory[name] = [];
    queueHistory[name].push({ t: now, len: Number(queues[name].length) || 0 });
  }
  const cutoff = now - CHART_WINDOW_MS;
  for (const name of Object.keys(queueHistory)) {
    queueHistory[name] = queueHistory[name].filter(p => p.t >= cutoff);
    if (queueHistory[name].length === 0) delete queueHistory[name];
  }
}

function drawQueueChart() {
  const canvas = document.getElementById("queue-chart");
  if (!canvas || !canvas.isConnected) return;
  const rect = canvas.getBoundingClientRect();
  if (rect.width === 0) return;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  ctx.clearRect(0, 0, W, H);

  const style = getComputedStyle(document.body);
  const fg2 = style.getPropertyValue("--fg2").trim() || "#888";
  const border = style.getPropertyValue("--border").trim() || "#ccc";

  const names = Object.keys(queueHistory).sort();
  ctx.font = "10px -apple-system, BlinkMacSystemFont, sans-serif";
  if (names.length === 0) {
    ctx.fillStyle = fg2;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("Waiting for data…", W / 2, H / 2);
    return;
  }

  const padL = 36, padR = 8, padT = 24, padB = 20;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const now = Date.now();
  const tMin = now - CHART_WINDOW_MS;
  let maxLen = 0;
  for (const name of names) for (const p of queueHistory[name]) if (p.len > maxLen) maxLen = p.len;
  const yMax = Math.max(1, Math.ceil(maxLen * 1.1));

  ctx.strokeStyle = border;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, padT);
  ctx.lineTo(padL, padT + plotH);
  ctx.lineTo(padL + plotW, padT + plotH);
  ctx.stroke();

  ctx.fillStyle = fg2;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  const ySteps = 4;
  for (let i = 0; i <= ySteps; i++) {
    const v = Math.round((yMax * i) / ySteps);
    const y = padT + plotH - (plotH * i) / ySteps;
    ctx.fillText(String(v), padL - 4, y);
    if (i > 0) {
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(padL + plotW, y);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText("-5m", padL, padT + plotH + 4);
  ctx.fillText("now", padL + plotW, padT + plotH + 4);

  names.forEach((name, idx) => {
    const color = CHART_PALETTE[idx % CHART_PALETTE.length];
    const pts = queueHistory[name];
    if (pts.length < 1) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    pts.forEach((p, i) => {
      const x = padL + (plotW * (p.t - tMin)) / CHART_WINDOW_MS;
      const y = padT + plotH - (plotH * Math.min(p.len, yMax)) / yMax;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
  });

  ctx.textAlign = "left";
  ctx.textBaseline = "middle";
  let lx = padL, ly = padT - 10;
  names.forEach((name, idx) => {
    const color = CHART_PALETTE[idx % CHART_PALETTE.length];
    const label = name;
    const w = 14 + ctx.measureText(label).width + 12;
    if (lx + w > padL + plotW) return;
    ctx.fillStyle = color;
    ctx.fillRect(lx, ly - 1, 10, 2);
    ctx.fillStyle = fg2;
    ctx.fillText(label, lx + 14, ly);
    lx += w;
  });
}

function renderArgs(args) {
  if (Array.isArray(args) && args.length === 1 && args[0] && typeof args[0] === "object") {
    return jsonPretty(args[0]);
  }
  return jsonPretty(args ?? []);
}

function jsonPretty(value) {
  const json = JSON.stringify(value, null, 2);
  if (json === undefined) return "";
  return esc(json).replace(
    /("(?:\\.|[^"\\])*")(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?/g,
    (match, str, colon, lit) => {
      if (str !== undefined) {
        return colon
          ? '<span class="j-key">' + str + '</span>' + colon
          : '<span class="j-str">' + str + '</span>';
      }
      if (lit === "null") return '<span class="j-null">null</span>';
      if (lit !== undefined) return '<span class="j-bool">' + lit + '</span>';
      return '<span class="j-num">' + match + '</span>';
    }
  );
}

async function doLogin() {
  password = document.getElementById("password").value;
  try {
    await apiFetch("/resque-admin/overview");
    sessionStorage.setItem("resque-admin-password", password);
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    switchTab(parseHash().panel, { queue: parseHash().queue });
    startRefresh();
  } catch (e) {
    document.getElementById("login-error").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

const loaders = { overview: loadOverview, failed: loadFailed, queues: loadQueues, delayed: loadDelayed, locks: loadLocks, redis: loadRedis };

function refreshActiveTab() {
  const active = document.querySelector(".tab.active");
  if (active && loaders[active.dataset.panel]) loaders[active.dataset.panel]();
}

function startRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshActiveTab, 5000);
}

function parseHash() {
  const h = location.hash.slice(1);
  if (!h) return { panel: "overview", queue: null };
  const slash = h.indexOf("/");
  if (slash < 0) return { panel: h, queue: null };
  return { panel: h.slice(0, slash), queue: decodeURIComponent(h.slice(slash + 1)) };
}

async function switchTab(panel, opts = {}) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  const tab = document.querySelector('[data-panel="' + panel + '"]');
  if (!tab) return;
  tab.classList.add("active");
  document.getElementById(panel).classList.add("active");
  if (panel === "queues") {
    const queueName = opts.queue || null;
    location.hash = queueName ? "queues/" + encodeURIComponent(queueName) : "queues";
    await loadQueues();
    if (queueName) {
      const select = document.getElementById("queue-name");
      if (!Array.from(select.options).some(o => o.value === queueName)) {
        const opt = document.createElement("option");
        opt.value = queueName;
        opt.textContent = queueName;
        select.appendChild(opt);
      }
      select.value = queueName;
      loadQueue();
    }
  } else {
    location.hash = panel;
    if (loaders[panel]) loaders[panel]();
  }
}

// Tab switching
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => switchTab(tab.dataset.panel));
});

async function loadOverview() {
  try {
    const data = await apiFetch("/resque-admin/overview");
    const stats = document.getElementById("overview-stats");
    stats.innerHTML = [
      { label: "Processed", value: data.stats?.processed || 0 },
      { label: "Failed (total)", value: data.stats?.failed || 0 },
      { label: "Failed (pending)", value: data.failedCount || 0 },
      { label: "Leader", value: data.leader || "none" },
    ].map(s => '<div class="stat-card"><div class="label">' + esc(s.label) + '</div><div class="value">' + esc(s.value) + '</div></div>').join("");

    sampleQueues(data.queues || {});
    drawQueueChart();

    const queues = document.getElementById("overview-queues");
    const queueEntries = Object.entries(data.queues || {});
    queues.innerHTML = queueEntries.length === 0
      ? '<tr><td colspan="3">No queues</td></tr>'
      : queueEntries.map(([name, info]) =>
        '<tr><td><span class="queue-link" onclick="inspectQueue(\'' + esc(name) + '\')">' + esc(name) + '</span></td><td>' + esc(info.length) + '</td><td><button class="btn-danger" onclick="deleteQueue(\'' + esc(name) + '\')">Delete</button></td></tr>'
      ).join("");

    const workers = document.getElementById("overview-workers");
    const workerEntries = Object.entries(data.workers || {});
    workers.innerHTML = workerEntries.length === 0
      ? '<tr><td colspan="2">No workers</td></tr>'
      : workerEntries.map(([name, info]) =>
        '<tr><td>' + esc(name) + '</td><td><pre>' + (typeof info === "string" ? esc(info) : jsonPretty(info)) + '</pre></td></tr>'
      ).join("");
  } catch (e) {
    document.getElementById("overview-stats").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function loadFailed() {
  try {
    const data = await apiFetch("/resque-admin/failed");
    const total = Number(data.totalFailed) || 0;
    document.getElementById("failed-info").innerHTML = '<div class="form-row" style="align-items:center"><p style="margin:0">Total failed: <strong>' + esc(total) + '</strong></p>'
      + (total > 0 ? ' <button class="btn-danger" onclick="removeAllFailed()">Remove All</button>' : '')
      + '</div>';
    const tbody = document.getElementById("failed-jobs");
    tbody.innerHTML = (data.jobs || []).length === 0
      ? '<tr><td colspan="6">No failed jobs</td></tr>'
      : data.jobs.map((job, i) =>
        '<tr><td>' + esc(job.failed_at) + '</td><td>' + esc(job.payload?.class) + '</td>'
        + '<td><pre>' + renderArgs(job.payload?.args) + '</pre></td>'
        + '<td>' + esc(job.queue) + '</td><td><pre>' + esc(job.error) + '</pre></td>'
        + '<td><button class="btn-success" onclick="retryFailed(' + i + ')">Retry</button> '
        + '<button class="btn-danger" onclick="removeFailed(' + i + ')">Remove</button></td></tr>'
      ).join("");
    // Stash for retry/remove
    window._failedJobs = data.jobs || [];
  } catch (e) {
    document.getElementById("failed-info").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function retryFailed(index) {
  try {
    const job = window._failedJobs[index];
    await apiFetch("/resque-admin/retry-failed", { method: "POST", body: { failedJob: JSON.stringify(job) } });
    document.getElementById("failed-msg").innerHTML = '<div class="msg msg-success">Job retried</div>';
    loadFailed();
  } catch (e) {
    document.getElementById("failed-msg").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function removeFailed(index) {
  try {
    const job = window._failedJobs[index];
    await apiFetch("/resque-admin/remove-failed", { method: "POST", body: { failedJob: JSON.stringify(job) } });
    document.getElementById("failed-msg").innerHTML = '<div class="msg msg-success">Job removed</div>';
    loadFailed();
  } catch (e) {
    document.getElementById("failed-msg").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function removeAllFailed() {
  if (!confirm("Remove ALL failed jobs? This cannot be undone.")) return;
  try {
    const res = await apiFetch("/resque-admin/remove-all-failed", { method: "POST" });
    document.getElementById("failed-msg").innerHTML = '<div class="msg msg-success">Removed ' + esc(res.removed ?? 0) + ' failed jobs</div>';
    loadFailed();
  } catch (e) {
    document.getElementById("failed-msg").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

function inspectQueue(name) {
  switchTab("queues", { queue: name });
}

async function loadQueues() {
  try {
    const data = await apiFetch("/resque-admin/overview");
    const select = document.getElementById("queue-name");
    const prev = select.value;
    const names = Object.keys(data.queues || {}).sort();
    const current = Array.from(select.options).map(o => o.value);
    const changed = names.length !== current.length || names.some((n, i) => n !== current[i]);
    if (!changed) return;
    select.innerHTML = names.length === 0
      ? '<option value="">No queues</option>'
      : names.map(n => '<option value="' + esc(n) + '">' + esc(n) + '</option>').join("");
    if (prev && names.includes(prev)) select.value = prev;
  } catch (e) {
    document.getElementById("queue-info").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function loadQueue() {
  const name = document.getElementById("queue-name").value || "default";
  location.hash = "queues/" + encodeURIComponent(name);
  try {
    const data = await apiFetch("/resque-admin/queue/" + encodeURIComponent(name));
    document.getElementById("queue-info").innerHTML = '<p>Queue: <strong>' + esc(data.queue) + '</strong> — ' + esc((data.jobs || []).length) + ' jobs shown</p>';
    document.getElementById("queue-jobs").innerHTML = jsonPretty(data.jobs);
  } catch (e) {
    document.getElementById("queue-info").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
    document.getElementById("queue-jobs").textContent = "";
  }
}

async function deleteQueue(name) {
  if (!confirm("Delete queue '" + name + "' and all its jobs?")) return;
  try {
    await apiFetch("/resque-admin/del-queue", { method: "POST", body: { queue: name } });
    loadOverview();
  } catch (e) {
    alert(e.message);
  }
}

async function loadDelayed() {
  try {
    const data = await apiFetch("/resque-admin/delayed");
    const el = document.getElementById("delayed-content");
    const entries = Object.entries(data.delayed || {});
    if (entries.length === 0) {
      el.innerHTML = '<p>No delayed jobs</p>';
      return;
    }
    el.innerHTML = entries.map(([ts, jobs]) =>
      '<h2>' + esc(new Date(Number(ts) * 1000).toLocaleString()) + ' (' + esc(jobs.length) + ' jobs)</h2><pre>' + jsonPretty(jobs) + '</pre>'
    ).join("");
  } catch (e) {
    document.getElementById("delayed-content").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function loadLocks() {
  try {
    const data = await apiFetch("/resque-admin/locks");
    const tbody = document.getElementById("locks-list");
    const entries = Object.entries(data.locks || {});
    tbody.innerHTML = entries.length === 0
      ? '<tr><td colspan="3">No locks</td></tr>'
      : entries.map(([key, val]) =>
        '<tr><td style="font-family:var(--mono);font-size:0.8rem">' + esc(key) + '</td><td>' + esc(val) + '</td>'
        + '<td><button class="btn-danger" onclick="deleteLock(\'' + esc(key) + '\')">Delete</button></td></tr>'
      ).join("");
  } catch (e) {
    document.getElementById("locks-list").innerHTML = '<tr><td colspan="3">' + esc(e.message) + '</td></tr>';
  }
}

async function deleteLock(key) {
  try {
    await apiFetch("/resque-admin/del-lock", { method: "POST", body: { lock: key } });
    document.getElementById("locks-msg").innerHTML = '<div class="msg msg-success">Lock deleted</div>';
    loadLocks();
  } catch (e) {
    document.getElementById("locks-msg").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function loadRedis() {
  try {
    const data = await apiFetch("/resque-admin/redis-info");
    const el = document.getElementById("redis-content");
    el.innerHTML = Object.entries(data.sections || {}).map(([section, kvs]) =>
      '<h2>' + esc(section) + '</h2><table>' + Object.entries(kvs).map(([k, v]) =>
        '<tr><td style="font-family:var(--mono);font-size:0.8rem;width:40%">' + esc(k) + '</td><td>' + esc(v) + '</td></tr>'
      ).join("") + '</table>'
    ).join("");
  } catch (e) {
    document.getElementById("redis-content").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

async function doEnqueue() {
  try {
    const actionName = document.getElementById("enqueue-action").value;
    const queue = document.getElementById("enqueue-queue").value || undefined;
    const inputs = document.getElementById("enqueue-inputs").value || "{}";
    JSON.parse(inputs); // validate
    const data = await apiFetch("/resque-admin/enqueue", {
      method: "POST",
      body: { actionName, queue, inputs },
    });
    document.getElementById("enqueue-msg").innerHTML = '<div class="msg msg-success">Enqueued ' + esc(data.actionName) + ' on queue ' + esc(data.queue) + '</div>';
  } catch (e) {
    document.getElementById("enqueue-msg").innerHTML = '<div class="msg msg-error">' + esc(e.message) + '</div>';
  }
}

// Auto-login if password is stored
if (password) {
  apiFetch("/resque-admin/overview").then(() => {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    switchTab(parseHash().panel, { queue: parseHash().queue });
    startRefresh();
  }).catch(() => {
    sessionStorage.removeItem("resque-admin-password");
    password = "";
  });
}

// Enter key on password input
document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
